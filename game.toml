[game]
name = "Mega Man X6"
id = "SLUS-01395"
exe = "mmx6/SLUS_013.95"
disc = "mmx6/Mega Man X6 (USA) (v1.1).cue"
load_address = "0x80010000"
entry_pc = "0x80054AD8"
text_size = "0x0007F000"
stack_base = "0x801FFFF0"

[recompiler]
seeds = "seeds/ghidra_funcs.txt"
# bios_thunks = "seeds/mmx6_bios_thunks.txt"  # optional; add once BIOS thunks are inventoried
out_dir = "generated"
strict = true

[runtime]
debug_port = 4490
window_title = "MegaManX6Recomp"
memcard_dir = "saves"
# Disc speed + fast loads — the architecturally-correct model.
#
# Speeding the GUEST-VISIBLE CD device (disc_speed="4x"/"instant") is
# fundamentally unsafe: it changes how many VBlanks/callbacks fall between the
# game's state transitions, so timing-sensitive titles break. MMX6 proves it —
# at 4x/instant it wedges at boot because its Psy-Q VSync callback (which ticks a
# counter the loader busy-waits on, func 0x80060ADC / counter 0x8008C8E4) is torn
# down early when the read completes "too fast", so the counter freezes and the
# wait never returns. (The CD response arbiter + authentic command latencies in
# cdrom.c are still correct and shipped; they just can't make device-instant
# safe.) Mature emulators treat raw CD speedup as best-effort/per-game for this
# reason.
#
# The SAFE way to get fast loads is to keep AUTHENTIC guest CD timing (so nothing
# breaks) and instead FAST-FORWARD THE WHOLE GUEST TIMELINE during loads — run
# every authentic VBlank/callback/sector at the host's full speed and skip
# presentation. That's turbo_loads: cdrom_load_in_progress() detects the CD burst
# (XA/FMV excluded, post-handoff only) and main.cpp drops wall-clock pacing while
# it's active. Result: real load time shrinks with zero timing breakage.
disc_speed   = "1x"     # authentic guest CD timing (never breaks game timing)
turbo_loads  = true     # fast-forward the machine during CD loads (the real speed lever)
# Overlay acceleration: compile the dirty-RAM overlay (ROCK_X6.DAT) to native
# instead of interpreting it. backend=auto => gcc (full-C overlay DLLs, the
# production path) since an autocompile cmd is wired. Background pipeline:
# capture overlay candidates -> compile_overlays.py spawns gcc -> DLLs in
# build-modern/cache/SLUS-01395/ -> loader rescans + loads. --cps matches the
# CPS-on generated code (REQUIRED or DLLs misbehave); --gcc is the mingw abspath.
overlay_cache = true
# Tier selection: "auto" (default) = gcc if a gcc toolchain is present (dev /
# production shard authoring), else the bundled toolchain-free tcc. Other values:
# "gcc", "tcc", "auto-no-gcc" (dev: force tcc even with gcc present, to test the
# user path). Priority is static > gcc shard > tcc shard > interp.
overlay_backend = "auto"
overlay_autocompile_cmd = "python ../psxrecomp/tools/compile_overlays.py --captures build-modern/overlay_captures.json --game-toml game.toml --recompiler ../psxrecomp/recompiler/build/psxrecomp-game.exe --runtime-include ../psxrecomp/runtime/include --out-dir build-modern/cache --gcc C:/msys64/mingw64/bin/gcc.exe --cps"
# tcc fallback: NO explicit cmd — when the backend resolves to tcc the runtime
# constructs the command from the self-contained toolchain bundled beside the exe
# (<exe>/overlay_toolchain/: embedded python + tcc + recompiler + script + headers).
# An explicit overlay_autocompile_cmd_tcc here would override that (dev escape hatch).

[video]
# aspect_ratio: native presentation. MMX6 ships 4:3 (authentic); the launcher's
# Settings → "Widescreen (EXPERIMENTAL)" toggle flips this to "16:9" in
# settings.toml to opt into the experimental 2D widescreen (real wider field of
# view — see WIDESCREEN.md / [widescreen] below). Off by default; the toggle is
# the single user control (the [widescreen] full_2d + bg2d hooks are always
# compiled in and stay inert at 4:3).
aspect_ratio = "4:3"

# auto_skip_fmv: auto-skip full-motion videos (XA audio + MDEC). The launcher's
# Settings → "Skip FMVs" toggle mirrors this and persists to settings.toml.
# Enabled by default for MMX6 so the X-vs-Zero opening movie fast-forwards.
#
# End mechanism — two paths (see runtime/src/main.cpp FMV auto-skip block):
#  - fmv_skip_total_table set: write the active movie's per-movie frame-total
#    down so the game's OWN player tears it down next frame — a natural end that
#    reaches EVERY movie, incl. unskippable ones (this is Tomba's universal path).
#  - no table (current): generic fallback holds START so a movie whose handler
#    polls the pad aborts itself. Works for the pad-skippable opening; CANNOT
#    reach movies the game won't let you skip.
# TODO(complete): RE MMX6's MDEC player loop (find the per-movie frame-total
#   table base, the current-movie-id byte, and the teardown frame# >= total-k
#   condition) and fill fmv_skip_total_table / fmv_skip_movie_id /
#   fmv_skip_end_total for universal skip, matching Tomba. Until then the generic
#   START path is active. (MMX6 ISSUES.md tracks this.)
auto_skip_fmv = true

# Controller defaults. Mega Man X6 probes the pad with the DualShock config
# command (0x43) at init and will NOT poll buttons (0x42) until it detects an
# analog-capable controller — a plain digital pad leaves the game with no input.
# So present a DualShock (analog) by default: default_analog=true pins port 1 to
# PAD_MODE_ANALOG (id 0x73), which the corrected SIO config state machine
# (runtime/src/sio.c) now negotiates correctly. The launcher's per-player
# DualShock toggle / controller-mode selector overrides this (persisted to
# settings.toml); leaving it analog is the "forced DualShock" default.
[controller]
default_analog = true
deadzone       = 12000
# MMX6 hard-requires a DualShock (it won't poll buttons without an analog pad),
# so the "Hybrid" launcher pad mode doesn't apply — hide it, leaving Analog and
# D-Pad as the only choices.
allow_hybrid   = false

# Experimental 16:9 widescreen for a pure-2D sprite engine.
#
# MMX6 never emits the 3D sprite-tag hook the framework's gameplay detector keys
# on, so without full_2d every in-game frame is misclassified as a "full-2D menu"
# and pillarboxed 4:3. full_2d treats every in-game frame as gameplay so the
# native-wide present path engages. Pair with [video] aspect_ratio = "16:9"
# (set in settings.toml / the launcher); at 4:3 this flag is inert. Runtime-only
# (no regen). The wider field of view itself is an ongoing RE effort (the engine
# renders a true 4:3 view — there is no overscan to merely "reveal"); this flag
# is the opt-in switch the FOV work plugs into.
[widescreen]
full_2d = true

# True wider FOV for the 2D background. MMX6's per-layer BG renderer (FUN_800270d0)
# draws 21 (0x15) tile columns x 16 rows from a camera-derived start; these three
# instruction sites let the recompiler widen that loop (count + start col + start
# screen-x) so it draws the 16:9 reveal columns on BOTH sides of the 320 view,
# filling the margins with real adjacent stage. Identity at 4:3 and in the engine's
# own 512 hi-res mode (psx_ws_mmx6_bg_* helpers in gpu.c). Regen required.
#   count_site:    0x800271d4  li s6,0x15        (column count)
#   startcol_site: 0x80027188  andi v1,v1,0x3f   (start tile column)
#   startx_site:   0x800271a0  sra s4,v0,0x10    (start screen-x)
[widescreen.bg2d]
count_site    = "0x800271d4"
startcol_site = "0x80027188"
startx_site   = "0x800271a0"
# Tile-ring streamer (FUN_800273e4) leading-edge widen — without this the extra
# columns the renderer draws fetch un-streamed ring slots (empty=black margin, or
# stale=old tiles as the camera scrolls). These two addiu compute the left
# (scrollX-16) and right (scrollX+16, before +width) stream world-X; pushed out by
# LEFT*16 so the 64-col ring stays valid across the widened window.
#   stream_left_site:  0x80027424  addiu a1,s1,-0x10
#   stream_right_site: 0x80027444  addiu a1,s1,0x10
stream_left_site  = "0x80027424"
stream_right_site = "0x80027444"
# Packet-buffer RELOCATION — cures the dense-stage overflow of the engine's BG packet
# double-buffer (base 0x800B91C0, stride 0x4000 = 1024 slots) + its 1000-tile/frame cap
# that the widen overruns (void/garbled columns). When the widen is active, relocate the
# double-buffer to a larger proven-free region + raise the cap (gpu.c psx_ws_mmx6_bg_bufbase
# / _undercap; identity at 4:3). bufbase_site = driver addu (buffer addr); cap_site = slti.
bufbase_site = "0x80026dc4"
cap_site     = "0x80027278"

# ── Audit-specific config (consumed by psxrecomp-v4/tools/*.py and tests) ──
# Schema mirrors psxrecomp-v4/bios/SCPH1001.toml. Paths are relative to the
# project root.

[audit]
# Dynamic discovery — functions are found by walking control flow from
# entry_pc. No Ghidra function-starts file is required to bootstrap.

# Code region: text segment is contiguous from load_address for text_size bytes.
[[audit.regions]]
name        = "Text"
rom_start   = "0x800"          # offset within the PS-X EXE file (skip header)
rom_end     = "0x7F800"        # rom_start + text_size
vaddr_base  = "0x80010000"

# Address normalization: KSEG masking only (game loads contiguously, no remaps).
[audit.normalize]
kseg_mask = "0x1FFFFFFF"
